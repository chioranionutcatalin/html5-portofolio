name: Deploy to GCP VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH connectivity check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          script_stop: true
          debug: true
          script: |
            set -euo pipefail
            echo "Connected to VM"
            whoami
            hostname

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          script_stop: true
          debug: true
          script: |
            set -euo pipefail
            set -x
            APP_DIR="$HOME/html5-portofolio"
            REPO_URL="https://github.com/chioranionutcatalin/html5-portofolio.git"
            BRANCH="main"

            whoami
            hostname
            pwd
            command -v git
            command -v docker || true
            command -v curl || true
            sudo -n true

            if [ -d "${APP_DIR}/.git" ]; then
              cd "${APP_DIR}"
              git fetch origin "${BRANCH}"
              git reset --hard "origin/${BRANCH}"
            else
              git clone --branch "${BRANCH}" "${REPO_URL}" "${APP_DIR}"
            fi

            chmod +x "${APP_DIR}/scripts/vm_deploy.sh"
            sed -i 's/\r$//' "${APP_DIR}/scripts/vm_deploy.sh"
            bash -x "${APP_DIR}/scripts/vm_deploy.sh"
