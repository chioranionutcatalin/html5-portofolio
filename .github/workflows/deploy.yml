name: Deploy to GCP VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          script_stop: true
          script: |
            set -e
            if [ ! -x /opt/html5-portofolio-deploy/vm_deploy.sh ]; then
              sudo mkdir -p /opt/html5-portofolio-deploy
              sudo chown -R "$USER":"$USER" /opt/html5-portofolio-deploy
              cat > /opt/html5-portofolio-deploy/vm_deploy.sh <<'EOF'
            #!/usr/bin/env bash
            set -euo pipefail

            APP_DIR="/opt/html5-portofolio"
            REPO_URL="https://github.com/chioranionutcatalin/html5-portofolio.git"
            BRANCH="main"
            CONTAINER_NAME="portfolio-site"
            HOST_PORT="8081"

            if ! command -v git >/dev/null 2>&1; then
              echo "git is required on VM." >&2
              exit 1
            fi

            if ! command -v docker >/dev/null 2>&1; then
              echo "docker is required on VM." >&2
              exit 1
            fi

            sudo mkdir -p "${APP_DIR}"
            sudo chown -R "$USER":"$USER" "${APP_DIR}"

            if [ -d "${APP_DIR}/.git" ]; then
              cd "${APP_DIR}"
              git fetch origin "${BRANCH}"
              git reset --hard "origin/${BRANCH}"
            else
              rm -rf "${APP_DIR}"
              git clone --branch "${BRANCH}" "${REPO_URL}" "${APP_DIR}"
            fi

            if docker ps -a --format '{{.Names}}' | grep -q "^${CONTAINER_NAME}$"; then
              docker rm -f "${CONTAINER_NAME}"
            fi

            docker run -d \
              --name "${CONTAINER_NAME}" \
              --restart unless-stopped \
              -p "${HOST_PORT}:80" \
              -v "${APP_DIR}:/usr/share/nginx/html:ro" \
              nginx:alpine

            echo "Deploy complete. ${CONTAINER_NAME} serves ${APP_DIR} on port ${HOST_PORT}."
            EOF
              chmod +x /opt/html5-portofolio-deploy/vm_deploy.sh
            fi

            /opt/html5-portofolio-deploy/vm_deploy.sh
